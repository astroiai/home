name: Actualizar publicaciones

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: update-publications
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar papers desde NASA/ADS
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.ADS_TOKEN }}" \
            "https://api.adsabs.harvard.edu/v1/search/query?q=orcid:0000-0002-8686-8737+OR+orcid:0000-0002-3690-105X+OR+orcid:0000-0001-7853-4094+OR+orcid:0000-0003-0006-0188+OR+orcid:0000-0002-0149-1302+OR+orcid:0000-0001-7568-6412&sort=date+desc&fl=title,author,year,pub,volume,page,bibcode,identifier,doi&rows=20" \
            > js/publications-data.json

      - name: Normalizar JSON (evitar cambios falsos)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          jq -S . js/publications-data.json > tmp.json
          mv tmp.json js/publications-data.json

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add js/publications-data.json

          # Solo commit si hay cambios reales
          git diff --staged --quiet || git commit -m "Actualizar publicaciones desde NASA/ADS"

          # Sincronización robusta con remoto
          git fetch origin main
          git rebase origin/main

          # Push explícito
          git push origin HEAD:main
